<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>laht.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #ffffff;
    }
    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .center {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    p {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      letter-spacing: -0.01em;
      animation: colorfade 10s ease-in-out infinite;
    }
    @keyframes colorfade {
      0%   { color: #111111; }
      50%  { color: #cccccc; }
      100% { color: #111111; }
    }
  </style>
</head>
<body>
  <canvas id="wave"></canvas>
  <div class="center">
    <p>@laht.net</p>
  </div>
  <script>
    const canvas = document.getElementById('wave');
    const ctx = canvas.getContext('2d');
    let offset = 0;
    let boatX = null;
    let sunX = null;
    let sunY = null;
    let waveY = null;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      waveY = canvas.height * 0.68;
      if (boatX === null) {
        boatX = 20 + Math.random() * (canvas.width - 40);
        do {
          sunX = 20 + Math.random() * (canvas.width - 40);
        } while (Math.abs(sunX - boatX) < 80);
        sunY = 20 + Math.random() * (canvas.height * 0.25);
      }
    }
    window.addEventListener('resize', resize);
    resize();

    function getWaveY(x, off) {
      return waveY + Math.sin((x + off) * 0.05) * 8
                   + Math.sin((x + off * 1.3) * 0.03) * 5;
    }

    function drawSun(x, y) {
      const r = 5;
      const rays = 8;
      ctx.save();
      ctx.translate(x, y);
      ctx.strokeStyle = '#cccccc';
      ctx.lineWidth = 1;
      for (let i = 0; i < rays; i++) {
        const angle = (i / rays) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * (r + 2), Math.sin(angle) * (r + 2));
        ctx.lineTo(Math.cos(angle) * (r + 5), Math.sin(angle) * (r + 5));
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawBoat(x, y, angle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.strokeStyle = '#999999';
      ctx.lineWidth = 1;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(-10, 0);
      ctx.lineTo(-8, 5);
      ctx.lineTo(8, 5);
      ctx.lineTo(10, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -14);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, -13);
      ctx.lineTo(8, -4);
      ctx.lineTo(0, -1);
      ctx.closePath();
      ctx.fillStyle = '#cccccc';
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSun(sunX, sunY);
      ctx.beginPath();
      ctx.strokeStyle = '#cccccc';
      ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x++) {
        const y = getWaveY(x, offset);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      const by = getWaveY(boatX, offset);
      const dy = getWaveY(boatX + 2, offset) - getWaveY(boatX - 2, offset);
      const angle = Math.atan2(dy, 4);
      drawBoat(boatX, by, angle);
      offset += 0.8;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
