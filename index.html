<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>laht.net</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #ffffff; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .center { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none; }
    p {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      letter-spacing: -0.01em;
      animation: colorfade 10s ease-in-out infinite;
    }
    @keyframes colorfade {
      0%   { color: #111111; }
      50%  { color: #cccccc; }
      100% { color: #111111; }
    }
    #tooltip {
      position: fixed;
      background: rgba(255,255,255,0.92);
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 7px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #444;
      pointer-events: none;
      display: none;
      white-space: nowrap;
      z-index: 10;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <canvas id="wave"></canvas>
  <div class="center"><p>@laht.net</p></div>
  <div id="tooltip"></div>
  <script>
    const canvas = document.getElementById('wave');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    let offset = 0;
    let boatX = null, waveY = null;
    let mouseX = -999, mouseY = -999;
    let sunData = null, waterTemp = null, waveHeight = null;
    let waveAmp = 8, targetWaveAmp = 8;
    let weather = { isDay: 1, code: 0 };

    let celestialX = 100, celestialY = 100;
    let sunriseTs = null, sunsetTs = null;

    const SUN_LAT = 59.4370, SUN_LNG = 24.7536;
    const SEA_LAT = 59.4700, SEA_LNG = 24.8300;

    let drops = [], clouds = [], fish = [], bubbles = [];

    async function fetchSunData() {
      try {
        const res = await fetch(`https://api.sunrise-sunset.org/json?lat=${SUN_LAT}&lng=${SUN_LNG}&formatted=0`);
        const data = await res.json();
        if (data.status === 'OK') {
          const rise = new Date(data.results.sunrise);
          const set  = new Date(data.results.sunset);
          sunriseTs = rise.getTime();
          sunsetTs  = set.getTime();
          sunData = {
            rise: rise.toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Tallinn' }),
            set:  set.toLocaleTimeString('et-EE',  { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Tallinn' })
          };
        }
      } catch (e) { sunData = { rise: '—', set: '—' }; }
    }

    async function fetchMarineData() {
      try {
        const res = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${SEA_LAT}&longitude=${SEA_LNG}&current=sea_surface_temperature,wave_height`);
        const data = await res.json();
        waterTemp  = data.current?.sea_surface_temperature ?? null;
        waveHeight = data.current?.wave_height ?? null;
        if (waveHeight !== null) {
          if      (waveHeight < 0.3)  targetWaveAmp = 3;
          else if (waveHeight < 0.8)  targetWaveAmp = 8;
          else if (waveHeight < 1.5)  targetWaveAmp = 16;
          else                        targetWaveAmp = 26;
        }
      } catch (e) { waterTemp = null; waveHeight = null; }
    }

    async function fetchWeather() {
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${SUN_LAT}&longitude=${SUN_LNG}&current=weather_code,is_day`);
        const data = await res.json();
        weather.isDay = data.current?.is_day ?? 1;
        weather.code  = data.current?.weather_code ?? 0;
        initClouds(); initDrops();
      } catch (e) {}
    }

    fetchSunData(); fetchMarineData(); fetchWeather();

    function getCelestialPos() {
      if (!waveY) return { x: canvas.width * 0.5, y: 80 };
      const now    = Date.now();
      const margin = canvas.width * 0.08;
      const left   = margin;
      const right  = canvas.width - margin;
      const horizon = waveY - 10;
      const peak   = canvas.height * 0.08;
      // Kui API pole veel vastanud, kasuta ligikaudset Tallinna aega
      const d = new Date();
      const tzOffset = 2 * 3600 * 1000; // EET (UTC+2)
      const rise = sunriseTs ?? new Date(d.getFullYear(), d.getMonth(), d.getDate(), 6, 0, 0).getTime() - d.getTimezoneOffset() * 60000 + tzOffset;
      const set  = sunsetTs  ?? new Date(d.getFullYear(), d.getMonth(), d.getDate(), 20, 0, 0).getTime() - d.getTimezoneOffset() * 60000 + tzOffset;
      if (weather.isDay === 1) {
        const t = Math.max(0, Math.min(1, (now - rise) / (set - rise)));
        return {
          x: left + t * (right - left),
          y: horizon - Math.sin(t * Math.PI) * (horizon - peak)
        };
      } else {
        const nextSunrise = rise + 24 * 3600 * 1000;
        const t = Math.max(0, Math.min(1, (now - set) / (nextSunrise - set)));
        return {
          x: left + t * (right - left),
          y: horizon - Math.sin(t * Math.PI) * (horizon - peak)
        };
      }
    }

    function isRain()   { const c = weather.code; return (c >= 51 && c <= 67) || (c >= 80 && c <= 82) || (c >= 95 && c <= 99); }
    function isSnow()   { const c = weather.code; return c >= 71 && c <= 77; }
    function isCloudy() { return weather.code >= 1; }

    function getSkyColor() {
      if (weather.isDay === 0) return isCloudy() ? '#1a1f2e' : '#0d1220';
      if (isRain()) return '#b8bec6';
      if (weather.code === 3) return '#dbe8f0';
      if (weather.code === 2) return '#ccdff0';
      if (weather.code === 1) return '#ddeeff';
      return '#ffffff';
    }

    function getWaterColor() {
      if (weather.isDay === 0) return 'rgba(20,50,80,0.75)';
      if (isRain() || weather.code >= 2) return 'rgba(90,130,160,0.55)';
      if (isCloudy()) return 'rgba(100,145,175,0.45)';
      return 'rgba(173,216,230,0.35)';
    }

    function getWaveLineColor() {
      if (weather.isDay === 0) return '#334455';
      if (isRain() || weather.code >= 2) return '#7a9db5';
      if (isCloudy()) return '#9ab5c8';
      return '#cccccc';
    }

    function getTextColor() { return weather.isDay === 0 ? '#e0e0e0' : '#111111'; }

    function initClouds() {
      clouds = [];
      if (!isCloudy()) return;
      const count = weather.code >= 3 ? 5 : 3;
      for (let i = 0; i < count; i++) {
        clouds.push({
          x: Math.random() * canvas.width,
          y: canvas.height * 0.05 + Math.random() * canvas.height * 0.28,
          vx: 0.15 + Math.random() * 0.2,
          w: 60 + Math.random() * 80,
          h: 20 + Math.random() * 20,
          alpha: weather.code >= 3 ? 0.7 : 0.45,
        });
      }
    }

    function initDrops() {
      drops = [];
      if (!isRain() && !isSnow()) return;
      const count = isSnow() ? 60 : 120;
      for (let i = 0; i < count; i++) drops.push(newDrop(true));
    }

    function newDrop(random = false) {
      return {
        x: Math.random() * canvas.width,
        y: random ? Math.random() * canvas.height : -10,
        vy: isSnow() ? 0.6 + Math.random() * 0.5 : 6 + Math.random() * 4,
        vx: isSnow() ? (Math.random() - 0.5) * 0.5 : -0.5,
        len: isSnow() ? 0 : 8 + Math.random() * 4,
        r: isSnow() ? 1.5 + Math.random() * 1.5 : 0,
      };
    }

    function initFish() {
      fish = [];
      for (let i = 0; i < 5; i++) {
        fish.push({
          x: Math.random() * canvas.width,
          y: waveY + 30 + Math.random() * (canvas.height - waveY - 60),
          vx: (Math.random() < 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.6),
          vy: (Math.random() - 0.5) * 0.3,
          size: 7 + Math.random() * 6,
          tailPhase: Math.random() * Math.PI * 2,
          scaredTimer: 0, scaredVx: 0, scaredVy: 0,
          bubbles: i === 0, bubbleTimer: 0,
          zzzTimer: Math.floor(Math.random() * 120),
        });
      }
    }

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      waveY = canvas.height * 0.68;
      if (boatX === null) {
        boatX = 20 + Math.random() * (canvas.width - 40);
        initFish(); initClouds(); initDrops();
      }
    }
    window.addEventListener('resize', resize);
    resize();

    function getWaveY(x, off) {
      return waveY + Math.sin((x + off) * 0.05) * waveAmp
                   + Math.sin((x + off * 1.3) * 0.03) * (waveAmp * 0.6);
    }

    function isUnderWave(mx, my) { return my > getWaveY(mx, offset); }

    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      fish.forEach(f => {
        if (weather.isDay === 0) return;
        const dx = mouseX - f.x, dy = mouseY - f.y;
        if (Math.sqrt(dx*dx+dy*dy) < 60 && isUnderWave(mouseX, mouseY)) {
          const a = Math.atan2(f.y - mouseY, f.x - mouseX);
          f.scaredTimer = 40; f.scaredVx = Math.cos(a)*4; f.scaredVy = Math.sin(a)*2;
        }
      });
      const dx = mouseX - celestialX, dy = mouseY - celestialY;
      if (Math.sqrt(dx*dx+dy*dy) < 44) {
        tooltip.innerHTML = sunData
          ? `${weather.isDay ? '☀️' : '🌙'} Tallinn<br>↑ ${sunData.rise}&nbsp;&nbsp;↓ ${sunData.set}`
          : `${weather.isDay ? '☀️' : '🌙'} Laen...`;
        tooltip.style.display = 'block';
        tooltip.style.left = (mouseX + 14) + 'px';
        tooltip.style.top  = (mouseY - 10) + 'px';
      } else if (isUnderWave(mouseX, mouseY)) {
        let html = '🌊 Pirita<br>';
        if (waterTemp !== null) html += `${waterTemp.toFixed(1)} °C`;
        else html += 'Laen...';
        if (waveHeight !== null) html += `&nbsp;&nbsp;↕ ${waveHeight.toFixed(2)} m`;
        tooltip.innerHTML = html;
        tooltip.style.display = 'block';
        tooltip.style.left = (mouseX + 14) + 'px';
        tooltip.style.top  = (mouseY - 10) + 'px';
      } else {
        tooltip.style.display = 'none';
      }
    });
    canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

    function drawSky() {
      ctx.fillStyle = getSkyColor();
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawSun(x, y) {
      const r = 5, glowR = 40, rays = 8;
      const glow = ctx.createRadialGradient(x, y, r, x, y, glowR);
      glow.addColorStop(0, 'rgba(255,220,80,0.45)');
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(x, y, glowR, 0, Math.PI*2);
      ctx.fillStyle = glow; ctx.fill();
      ctx.save(); ctx.translate(x, y);
      ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 1;
      for (let i = 0; i < rays; i++) {
        const a = (i/rays)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*(r+2), Math.sin(a)*(r+2));
        ctx.lineTo(Math.cos(a)*(r+5), Math.sin(a)*(r+5));
        ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.fillStyle='#ffffff'; ctx.fill(); ctx.stroke();
      ctx.restore();
    }

    function drawMoon(x, y) {
      const r = 8;
      const glow = ctx.createRadialGradient(x, y, r, x, y, r*5);
      glow.addColorStop(0, 'rgba(220,230,255,0.3)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(x, y, r*5, 0, Math.PI*2);
      ctx.fillStyle = glow; ctx.fill();
      ctx.save(); ctx.translate(x, y);
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.fillStyle = '#dde6ff'; ctx.fill();
      ctx.beginPath(); ctx.arc(3,0,r*0.88,0,Math.PI*2);
      ctx.fillStyle = getSkyColor(); ctx.fill();
      ctx.restore();
    }

    function drawClouds() {
      clouds.forEach(c => {
        c.x += c.vx;
        if (c.x > canvas.width + c.w) c.x = -c.w;
        const col = weather.isDay === 0 ? `rgba(60,70,90,${c.alpha})` : `rgba(190,198,208,${c.alpha})`;
        ctx.save(); ctx.translate(c.x, c.y); ctx.fillStyle = col;
        ctx.beginPath(); ctx.ellipse(0,0,c.w*0.5,c.h*0.4,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(-c.w*0.2,c.h*0.1,c.w*0.35,c.h*0.35,0,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.w*0.2,c.h*0.1,c.w*0.3,c.h*0.3,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      });
    }

    function drawDrops() {
      drops.forEach(d => {
        d.x += d.vx; d.y += d.vy;
        if (d.y > canvas.height) Object.assign(d, newDrop());
        if (isSnow()) {
          ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(220,230,255,0.7)'; ctx.fill();
        } else {
          ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x+d.vx, d.y-d.len);
          ctx.strokeStyle = 'rgba(90,120,160,0.55)'; ctx.lineWidth = 1; ctx.stroke();
        }
      });
    }

    function updateFish() {
      const isNight = weather.isDay === 0;
      const speedMult = isNight ? 0.15 : 1;
      const minY = waveY + 12, maxY = canvas.height - 12;
      fish.forEach(f => {
        f.tailPhase += isNight ? 0.02 : 0.12;
        if (f.scaredTimer > 0) {
          f.x += f.scaredVx; f.y += f.scaredVy;
          f.scaredVx *= 0.92; f.scaredVy *= 0.92; f.scaredTimer--;
        } else {
          f.vy += (Math.random()-0.5)*0.04*speedMult;
          f.vy *= 0.97; f.x += f.vx*speedMult; f.y += f.vy;
        }
        if (f.x < -20) f.x = canvas.width+20;
        if (f.x > canvas.width+20) f.x = -20;
        if (f.y < minY) { f.y = minY; f.vy = Math.abs(f.vy); }
        if (f.y > maxY) { f.y = maxY; f.vy = -Math.abs(f.vy); }
        if (isNight && f.bubbles) {
          f.zzzTimer++;
          if (f.zzzTimer >= 90) {
            f.zzzTimer = 0;
            bubbles.push({ x: f.x, y: f.y-f.size, zzz: true, life: 1.0, vy: -0.4, size: 7+Math.random()*4 });
          }
        } else if (!isNight && f.bubbles) {
          f.bubbleTimer++;
          if (f.bubbleTimer >= 40) {
            f.bubbleTimer = 0;
            const dir = f.vx >= 0 ? 1 : -1;
            bubbles.push({ x: f.x+dir*f.size, y: f.y-f.size*0.1, r: 1.5+Math.random()*1.5, vy: -(0.4+Math.random()*0.3), vx: (Math.random()-0.5)*0.3, life: 1.0, zzz: false });
          }
        }
      });
      bubbles.forEach(b => { b.y += b.vy; b.life -= 0.012; if (!b.zzz) { b.x += b.vx; b.r += 0.012; } });
      bubbles = bubbles.filter(b => b.life > 0 && (b.zzz || b.y > getWaveY(b.x, offset)));
    }

    function drawBubbles() {
      bubbles.forEach(b => {
        if (b.zzz) {
          ctx.save(); ctx.globalAlpha = b.life;
          ctx.font = `${b.size}px Inter`; ctx.fillStyle = '#aaaaaa';
          ctx.fillText('z', b.x, b.y); ctx.restore();
        } else {
          ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
          ctx.strokeStyle = `rgba(150,200,220,${b.life*0.7})`; ctx.lineWidth = 0.7; ctx.stroke();
        }
      });
    }

    function drawFish(f) {
      const isNight = weather.isDay === 0;
      const dir = f.vx >= 0 ? 1 : -1;
      const tailWag = Math.sin(f.tailPhase) * (isNight ? 0.2 : 1.2);
      const s = f.size, ba = isNight ? 0.4 : 0.7;
      ctx.save(); ctx.translate(f.x, f.y); ctx.scale(dir, 1);
      ctx.strokeStyle = isNight ? '#667788' : '#8aaabb'; ctx.lineWidth = 0.8;
      ctx.fillStyle = `rgba(200,225,235,${ba})`;
      ctx.beginPath(); ctx.ellipse(0,0,s,s*0.5,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-s+1,0); ctx.lineTo(-s-s*0.7,-s*0.5+tailWag*2); ctx.lineTo(-s-s*0.7,s*0.5+tailWag*2); ctx.closePath();
      ctx.fillStyle = `rgba(180,210,225,${ba})`; ctx.fill(); ctx.stroke();
      if (isNight) {
        ctx.beginPath(); ctx.moveTo(s*0.35,-s*0.05); ctx.lineTo(s*0.55,-s*0.05);
        ctx.strokeStyle = '#667788'; ctx.lineWidth = 0.8; ctx.stroke();
      } else {
        ctx.beginPath(); ctx.arc(s*0.45,-s*0.05,1.2,0,Math.PI*2);
        ctx.fillStyle = '#557788'; ctx.fill();
      }
      ctx.restore();
    }

    function drawBoat(x, y, angle) {
      ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
      ctx.strokeStyle = '#778899'; ctx.lineWidth = 1; ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(-10,0); ctx.lineTo(-8,5); ctx.lineTo(8,5); ctx.lineTo(10,0);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-14); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-13); ctx.lineTo(8,-4); ctx.lineTo(0,-1);
      ctx.closePath(); ctx.fillStyle='#aabbcc'; ctx.fill(); ctx.stroke();
      ctx.restore();
    }

    function draw() {
      waveAmp += (targetWaveAmp - waveAmp) * 0.01;
      const pos = getCelestialPos();
      celestialX = pos.x; celestialY = pos.y;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawSky();
      if (weather.isDay === 1) drawSun(celestialX, celestialY);
      else drawMoon(celestialX, celestialY);
      drawClouds(); drawDrops();
      ctx.beginPath();
      for (let x = 0; x <= canvas.width; x++) {
        const y = getWaveY(x, offset);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.closePath();
      ctx.fillStyle = getWaterColor(); ctx.fill();
      updateFish(); drawBubbles();
      fish.forEach(f => drawFish(f));
      ctx.beginPath(); ctx.strokeStyle = getWaveLineColor(); ctx.lineWidth = 1.5;
      for (let x = 0; x <= canvas.width; x++) {
        const y = getWaveY(x, offset);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      const by = getWaveY(boatX, offset);
      const dy = getWaveY(boatX+2, offset) - getWaveY(boatX-2, offset);
      drawBoat(boatX, by, Math.atan2(dy, 4));
      const pEl = document.querySelector('p');
      pEl.style.color = getTextColor();
      pEl.style.animation = weather.isDay === 0 ? 'none' : '';
      offset += 0.8;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
